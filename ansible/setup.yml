- name: Prepare servers for deployment
  hosts: all
  become: true

  tasks:
    - name: Update apt
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
          - git
        state: present

    - name: Install Docker
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Create app directory
      file:
        path: /home/ubuntu/app
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy docker-compose file
      copy:
        src: ../docker-compose.yml
        dest: /home/ubuntu/app/docker-compose.yml
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Copy nginx config
      copy:
        src: ../nginx/
        dest: /home/ubuntu/app/nginx/
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Create .env file for application
      copy:
        dest: /home/ubuntu/app/.env
        content: |
          DB_URL={{ db_url }}
          DB_USER={{ db_user }}
          DB_PASSWORD={{ db_password }}
          CORS_ORIGINS={{ cors_origins }}
        owner: ubuntu
        group: ubuntu
        mode: '0600'
