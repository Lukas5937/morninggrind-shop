name: CI-CD

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PWD }}

      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USER }}/morninggrind-backend:latest ./backend

      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USER }}/morninggrind-frontend:latest ./frontend

      - name: Push Backend Image
        if: github.event_name == 'push'
        run: docker push ${{ secrets.DOCKERHUB_USER }}/morninggrind-backend:latest

      - name: Push Frontend Image
        if: github.event_name == 'push'
        run: docker push ${{ secrets.DOCKERHUB_USER }}/morninggrind-frontend:latest

      - name: Start application for testing
        run: docker compose up -d

      - name: Wait for application
        run: sleep 10

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps

      - name: Run Playwright Tests
        run: |
          cd frontend
          npx playwright test --project=chromium

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

  CD_Staging:
    needs: CI
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            docker pull ${{ secrets.DOCKERHUB_USER }}/morninggrind-backend:latest
            docker pull ${{ secrets.DOCKERHUB_USER }}/morninggrind-frontend:latest
            docker compose down
            docker compose up -d

  CD_Production:
    needs: CI
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            docker pull ${{ secrets.DOCKERHUB_USER }}/morninggrind-backend:latest
            docker pull ${{ secrets.DOCKERHUB_USER }}/morninggrind-frontend:latest
            docker compose down
            docker compose up -d
